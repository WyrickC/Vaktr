name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-installer:
    name: Build Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Vaktr.sln

      - name: Publish app (self-contained x64)
        run: dotnet publish Vaktr.App/Vaktr.App.csproj -c Release -p:Platform=x64 -r win-x64 --self-contained -o publish/x64

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/vaktr-setup.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: VaktrSetup
          path: installer/Output/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe
          draft: true
          generate_release_notes: true
