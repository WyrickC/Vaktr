name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.1)'
        required: true
        default: '1.0.1'

permissions:
  contents: write

jobs:
  build-installer:
    name: Build Installer (${{ matrix.platform }})
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x64, ARM64]
        include:
          - platform: x64
            runtime: win-x64
            arch_flag: x64compatible
          - platform: ARM64
            runtime: win-arm64
            arch_flag: arm64

    env:
      # Use tag version if triggered by tag, otherwise use manual input
      RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', inputs.version) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Vaktr.sln

      - name: Publish app (self-contained ${{ matrix.platform }})
        run: dotnet publish Vaktr.App/Vaktr.App.csproj -c Release -p:Platform=${{ matrix.platform }} -r ${{ matrix.runtime }} --self-contained -o publish/${{ matrix.platform }}

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          $version = "${{ env.RELEASE_VERSION }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$version" /DMyAppArch="${{ matrix.arch_flag }}" /DMyPublishDir="publish/${{ matrix.platform }}" /DMyOutputSuffix="-${{ matrix.platform }}" installer/vaktr-setup.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: VaktrSetup-${{ matrix.platform }}-${{ env.RELEASE_VERSION }}
          path: installer/Output/*.exe

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-installer

    steps:
      - name: Download x64 installer
        uses: actions/download-artifact@v4
        with:
          pattern: VaktrSetup-*
          merge-multiple: true
          path: installers/

      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', inputs.version) }}
          git push origin ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', inputs.version) }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', inputs.version) }}
          files: installers/*.exe
          draft: true
          generate_release_notes: true
