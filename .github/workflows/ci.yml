name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x64, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore Vaktr.sln

      - name: Check formatting
        run: dotnet format Vaktr.sln --verify-no-changes --verbosity diagnostic
        continue-on-error: true

      - name: Build solution
        run: dotnet build Vaktr.sln -c Release -p:Platform=${{ matrix.platform }} --no-restore

      - name: Run tests
        if: matrix.platform == 'x64'
        run: dotnet test Vaktr.Tests/Vaktr.Tests.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always() && matrix.platform == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.platform }}
          path: Vaktr.Tests/TestResults/*.trx

      - name: Publish app (self-contained)
        run: dotnet publish Vaktr.App/Vaktr.App.csproj -c Release -p:Platform=${{ matrix.platform }} -r win-${{ matrix.platform }} --self-contained -o publish/${{ matrix.platform }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaktr-${{ matrix.platform }}
          path: publish/${{ matrix.platform }}
          retention-days: 14
